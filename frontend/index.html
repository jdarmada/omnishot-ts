<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>omnishot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,500&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrap">
      <h1>omnishot</h1>

      <div class="library" id="library">
        <div class="library-row">
          <div class="library-path">
            <span class="library-label">Library</span>
            <strong id="lib-path" title="">…</strong>
          </div>
          <button type="button" class="folder" id="change-folder">
            Change folder…
          </button>
        </div>
        <p class="library-hint">
          Add videos to this folder to index them. Move or delete a file to remove
          it from search.
        </p>
      </div>

      <div class="search-row" id="searchrow">
        <input
          id="q"
          placeholder="Describe the clip, or upload / drop a reference image"
          autocomplete="off"
          autofocus
        />
        <input
          type="file"
          id="image-file"
          accept="image/*"
          hidden
        />
        <button class="image" id="upload-image" type="button" title="Search by image">
          Image
        </button>
        <button class="go" id="go" type="button">Find</button>
      </div>
      <div class="querychip" id="querychip">
        <img id="qimg" alt="reference image" />
        <span>searching by image</span>
        <button type="button" id="clear-image">clear</button>
      </div>

      <div class="statusline" id="statusline">
        <span>clips <strong id="s-clips">0</strong></span>
        <span>chunks <strong id="s-chunks">0</strong></span>
        <span id="s-state"></span>
        <span id="s-lat"></span>
      </div>
      <div class="events" id="events"></div>

      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <div>Link a folder of footage to get started.</div>
        <div class="hint">
          Use Change folder… or drop videos into the library path above, then
          describe the shot you need.
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
