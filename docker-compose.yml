services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - JINA_API_KEY=${JINA_API_KEY}
      - ES_URL=http://elasticsearch:9200
      - WATCH_DIR=/data/clips
      - CHUNKS_DIR=/data/chunks
    volumes:
      - ./clips:/data/clips
      - ./chunks:/data/chunks
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  es-data:
